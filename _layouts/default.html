<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap');
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="nav-container">
        <a href="{{ site.baseurl }}/" class="nav-brand">{{ site.title }}</a>
        <ul class="nav-menu">
          {% if page.section == 'about' %}
            <li class="nav-item active"><a href="{{ site.baseurl }}/">关于我</a></li>
          {% else %}
            <li class="nav-item"><a href="{{ site.baseurl }}/">关于我</a></li>
          {% endif %}

          {% if page.section == 'cv' %}
            <li class="nav-item active"><a href="{{ site.baseurl }}/cv/">简历</a></li>
          {% else %}
            <li class="nav-item"><a href="{{ site.baseurl }}/cv/">简历</a></li>
          {% endif %}
        </ul>
      </div>
    </nav>
  </header>

  <main class="main-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.name }}. All rights reserved.</p>
    </div>
  </footer>

  <script src="{{ site.baseurl }}/assets/js/main.js"></script>
</body>
</html>
